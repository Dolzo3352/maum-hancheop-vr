<!-- Hero Section 컴포넌트 -->
<!-- 첫 화면: 작품명 + 핵심 메시지 + 배경 이미지 또는 그라디언트 -->

<section id="hero" style="
  width: 100%;
  height: 100vh;
  background: linear-gradient(135deg, #D4A574 0%, #F5DEB3 50%, #FEFAF0 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 20px;
  box-sizing: border-box;
  position: relative;
  overflow: hidden;
">

  <!-- 배경 디오라마 스타일 장식 -->
  <div style="
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: 
      radial-gradient(circle at 20% 50%, rgba(232, 149, 110, 0.1) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(139, 115, 85, 0.08) 0%, transparent 50%);
    pointer-events: none;
  "></div>

  <div style="
    position: relative;
    z-index: 1;
    max-width: 500px;
  ">

    <!-- 로고 -->
    <div style="
      width: 80px;
      height: 80px;
      margin: 0 auto 30px;
      background: rgba(212, 165, 116, 0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      color: #8B7355;
    ">
      🎬
    </div>

    <!-- 작품명 -->
    <h1 style="
      font-size: 48px;
      font-weight: 700;
      color: #3D3D3D;
      margin: 0 0 20px 0;
      line-height: 1.2;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    ">
      마음 한첩
    </h1>

    <!-- 영문명 -->
    <p style="
      font-size: 18px;
      color: #8B7355;
      margin: 0 0 30px 0;
      font-weight: 300;
      letter-spacing: 2px;
      font-family: 'Courier New', monospace;
    ">
      A Remedy for the Heart
    </p>

    <!-- 한 줄 설명 -->
    <p style="
      font-size: 16px;
      color: #3D3D3D;
      margin: 0 0 40px 0;
      line-height: 1.6;
      font-weight: 500;
    ">
      Meta Quest 3 기반 VR 디오라마 인터랙티브 내러티브
    </p>

    <!-- CTA 버튼 -->
    <a href="#story" style="
      display: inline-block;
      padding: 14px 40px;
      background-color: #E8956E;
      color: white;
      text-decoration: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      transition: all 0.3s ease;
      border: 2px solid #E8956E;
    " onmouseover="this.style.backgroundColor='#D4794F'; this.style.transform='scale(1.05)'" onmouseout="this.style.backgroundColor='#E8956E'; this.style.transform='scale(1)'">
      작품 보기
    </a>

  </div>

  <!-- 스크롤 인디케이터 -->
  <div style="
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    animation: bounce 2s infinite;
    color: #8B7355;
  ">
    ↓
  </div>

</section>

<style>
  @keyframes bounce {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(10px); }
  }
</style>
