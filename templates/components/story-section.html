<!-- Story Section 컴포넌트 -->
<!-- 스토리/줄거리 섹션 -->

<section id="story" style="
  width: 100%;
  padding: 80px 20px;
  background-color: #FEFAF0;
  box-sizing: border-box;
">

  <div style="
    max-width: 500px;
    margin: 0 auto;
  ">

    <!-- 섹션 타이틀 -->
    <h2 style="
      font-size: 32px;
      font-weight: 700;
      color: #3D3D3D;
      margin: 0 0 40px 0;
      text-align: center;
      position: relative;
      padding-bottom: 20px;
    ">
      이야기
      <span style="
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 60px;
        height: 3px;
        background-color: #E8956E;
        border-radius: 2px;
      "></span>
    </h2>

    <!-- 스토리 문장 1 -->
    <div style="
      margin-bottom: 30px;
    ">
      <p style="
        font-size: 16px;
        color: #3D3D3D;
        line-height: 1.8;
        margin: 0;
        font-weight: 500;
      ">
        아버지가 아프다.
      </p>
      <p style="
        font-size: 16px;
        color: #8B7355;
        line-height: 1.8;
        margin: 10px 0 0 0;
      ">
        아이는 약을 받으러 길을 나섰다.
      </p>
    </div>

    <!-- 구분선 -->
    <div style="
      height: 2px;
      background: linear-gradient(to right, transparent, #D4A574, transparent);
      margin: 40px 0;
    "></div>

    <!-- 스토리 문장 2 -->
    <div style="
      margin-bottom: 30px;
    ">
      <p style="
        font-size: 16px;
        color: #3D3D3D;
        line-height: 1.8;
        margin: 0;
        font-weight: 500;
      ">
        그만 버스를 반대로 타고 말았다.
      </p>
      <p style="
        font-size: 16px;
        color: #8B7355;
        line-height: 1.8;
        margin: 10px 0 0 0;
      ">
        그 실수가, 뜻밖의 방식으로 아버지에게 닿는 약이 된다.
      </p>
    </div>

    <!-- 구분선 -->
    <div style="
      height: 2px;
      background: linear-gradient(to right, transparent, #D4A574, transparent);
      margin: 40px 0;
    "></div>

    <!-- 메시지 박스 -->
    <div style="
      background-color: rgba(232, 149, 110, 0.08);
      border-left: 4px solid #E8956E;
      padding: 24px;
      border-radius: 4px;
      margin-top: 40px;
    ">
      <p style="
        font-size: 18px;
        color: #3D3D3D;
        line-height: 1.8;
        margin: 0;
        font-weight: 600;
      ">
        돌아가는 길이 틀린 길이 아닐 수 있다는 것.
      </p>
      <p style="
        font-size: 16px;
        color: #8B7355;
        line-height: 1.8;
        margin: 12px 0 0 0;
      ">
        진심은 실수조차 의미 있는 자리에 데려다 놓는다는 것.
      </p>
    </div>

    <!-- 가보이드 메시지 -->
    <div style="
      margin-top: 40px;
      padding: 20px;
      background-color: rgba(212, 165, 116, 0.06);
      border-radius: 4px;
      text-align: center;
    ">
      <p style="
        font-size: 15px;
        color: #8B7355;
        line-height: 1.8;
        margin: 0;
      ">
        지금 돌아가고 있다고 느끼는 사람에게,<br/>
        그 길이 헛된 것이 아니라고.<br/>
        당신이 걷는 방향은, 분명 맞닿을 곳이 있다고.
      </p>
    </div>

  </div>

</section>
