<!-- Interaction Section 컴포넌트 -->
<!-- 인터랙션 포인트 설명 -->

<section id="interaction" style="
  width: 100%;
  padding: 80px 20px;
  background-color: #FEFAF0;
  box-sizing: border-box;
">

  <div style="
    max-width: 500px;
    margin: 0 auto;
  ">

    <!-- 섹션 타이틀 -->
    <h2 style="
      font-size: 32px;
      font-weight: 700;
      color: #3D3D3D;
      margin: 0 0 50px 0;
      text-align: center;
      position: relative;
      padding-bottom: 20px;
    ">
      인터랙션
      <span style="
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 60px;
        height: 3px;
        background-color: #E8956E;
        border-radius: 2px;
      "></span>
    </h2>

    <!-- 인터랙션 1 -->
    <div style="
      margin-bottom: 40px;
      padding: 24px;
      background-color: rgba(212, 165, 116, 0.08);
      border-radius: 8px;

    ">
      <h3 style="
        font-size: 18px;
        font-weight: 700;
        color: #3D3D3D;
        margin: 0 0 12px 0;
      ">
        1. 타임라인 분기
      </h3>
      <p style="
        font-size: 14px;
        color: #8B7355;
        line-height: 1.6;
        margin: 0;
      ">
        관객이 선택한 경로에 따라 이야기가 갈라진다. 여러 번 경험해 다양한 엔딩을 발견할 수 있다.
      </p>
    </div>

    <!-- 인터랙션 2 -->
    <div style="
      margin-bottom: 40px;
      padding: 24px;
      background-color: rgba(232, 149, 110, 0.08);
      border-radius: 8px;
      border-left: 4px solid #E8956E;
    ">
      <h3 style="
        font-size: 18px;
        font-weight: 700;
        color: #3D3D3D;
        margin: 0 0 12px 0;
      ">
        2. 환경 변화
      </h3>
      <p style="
        font-size: 14px;
        color: #8B7355;
        line-height: 1.6;
        margin: 0;
      ">
        스크롤/시점 조작에 따라 배경과 세계가 변한다. 계절, 시간대, 지형의 변화가 은유적 연출을 담아낸다.
      </p>
    </div>

    <!-- 인터랙션 3 -->
    <div style="
      margin-bottom: 40px;
      padding: 24px;
      background-color: rgba(139, 115, 85, 0.08);
      border-radius: 8px;
      border-left: 4px solid #8B7355;
    ">
      <h3 style="
        font-size: 18px;
        font-weight: 700;
        color: #3D3D3D;
        margin: 0 0 12px 0;
      ">
        3. 세부 상호작용
      </h3>
      <p style="
        font-size: 14px;
        color: #8B7355;
        line-height: 1.6;
        margin: 0;
      ">
        VR 공간 내 객체와의 직관적 상호작용. 손 트래킹을 통해 이야기의 미세한 감정 변화를 조종할 수 있다.
      </p>
    </div>

    <!-- 설명 텍스트 -->
    <div style="
      marginTop: 50px;
      padding: 20px;
      background-color: rgba(212, 165, 116, 0.06);

      <p style="
        font-size: 14px;
        color: #8B7355;
        line-height: 1.7;
        margin: 0;
      ">
        모든 인터랙션은 이야기의 테마를 강화한다.<br/>

      </p>
